<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Bafo Masters</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Titan+One&family=Nunito:wght@400;700&display=swap');
    :root { --glass: rgba(20,20,30,0.9); }
    body { margin:0; overflow:hidden; background:#0f0c29; font-family:'Nunito',sans-serif; color:white; touch-action:none; user-select:none; }

    #ui-layer { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }
    .hud { padding:20px; display:flex; justify-content:space-between; pointer-events:auto; }
    .badge { background:rgba(0,0,0,0.6); border:2px solid #555; padding:10px 20px; border-radius:30px; font-family:'Titan One'; text-shadow:0 2px 0 black; transition:0.3s; }

    .screen { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(15,12,41,0.9); z-index:20; display:none; align-items:center; justify-content:center; pointer-events:auto; }
    .screen.active { display:flex; }

    .panel { background:var(--glass); padding:28px; border-radius:20px; border:1px solid rgba(255,255,255,0.1); text-align:center; max-width:560px; width:92%; box-shadow:0 0 50px rgba(108,92,231,0.3); }

    .btn { background:linear-gradient(180deg, #a29bfe, #6c5ce7); border:none; padding:15px; width:100%; border-radius:12px; color:white; font-family:'Titan One'; font-size:1.1rem; margin-top:10px; cursor:pointer; box-shadow:0 5px 0 #4834d4; }
    .btn:active { transform:translateY(4px); box-shadow:0 1px 0 #4834d4; }

    input, select { width:92%; padding:12px; margin:8px 0; border-radius:8px; border:none; background:#333; color:white; text-align:center; }

    #toast-area { position:absolute; top:100px; width:100%; display:flex; flex-direction:column; align-items:center; pointer-events:none; z-index:100; }
    .toast { background:rgba(0,0,0,0.8); padding:10px 20px; border-radius:20px; margin-bottom:10px; border-left:4px solid gold; animation:pop 0.3s; }
    @keyframes pop { from{transform:scale(0);} to{transform:scale(1);} }

    .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; max-height:240px; overflow-y:auto; padding:5px; }
    .slot { aspect-ratio:3/4; background:#333; border-radius:8px; border:2px solid transparent; cursor:pointer; }

    /* coleção */
    .collection-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:12px; max-height:360px; overflow:auto; padding:6px; }
    .collection-card { background:rgba(0,0,0,0.25); border:2px solid #777; border-radius:14px; overflow:hidden; }
    .collection-top { font-size:12px; padding:8px; opacity:.95; }
    .collection-img { width:100%; aspect-ratio:3/4; background-size:cover; background-position:center; }
    .counts { display:flex; justify-content:space-around; font-size:12px; margin: 10px 0; opacity:.9; }
    .counts span { padding:6px 8px; background:rgba(0,0,0,0.2); border-radius:10px; }

    canvas { display:block; }
    .small { font-size:12px; opacity:.85; margin-top: 6px; }
  </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="toast-area"></div>

<div id="ui-layer">
  <div class="hud" id="game-hud" style="display:none;">
    <div id="turn-badge" class="badge">Aguarde...</div>
    <button class="btn" style="width:auto; padding:8px 15px; margin:0;" onclick="window.openMenu()">Menu</button>
  </div>
</div>

<div id="screen-login" class="screen active">
  <div class="panel">
    <h1 style="font-family:'Titan One'; color:#a29bfe;">BAFO MASTERS</h1>
    <input id="login-user" placeholder="Usuário" />
    <input id="login-pass" type="password" placeholder="Senha" />
    <button class="btn" onclick="window.doLogin()">JOGAR</button>
  </div>
</div>

<div id="screen-menu" class="screen">
  <div class="panel">
    <h2>MENU</h2>
    <div style="display:flex; justify-content:space-around; margin-bottom:20px;">
      <span>🪙 <span id="coins-display">0</span></span>
      <span>🃏 <span id="cards-display">0</span></span>
    </div>

    <button class="btn" onclick="window.openBetting()">⚔️ Jogar</button>
    <button class="btn" onclick="window.openCollection()">🗂️ Coleção</button>
    <button class="btn" onclick="window.openGacha()">🎁 Pacote</button>
    <button class="btn" style="background:#444; box-shadow:none;" onclick="window.closeAll()">Sair</button>
  </div>
</div>

<div id="screen-bet" class="screen">
  <div class="panel">
    <h2>PARTIDA</h2>

    <select id="mode-select">
      <option value="free">Modo Livre (sem apostar)</option>
      <option value="bet">Modo Aposta (cartas do inventário)</option>
    </select>

    <select id="rarity-select">
      <option value="">Raridade: Qualquer</option>
      <option value="common">Common</option>
      <option value="rare">Rare</option>
      <option value="epic">Epic</option>
      <option value="legend">Legend</option>
    </select>

    <input id="free-count" type="number" min="3" max="30" value="9" />

    <div class="small">No modo aposta: selecione cartas abaixo.</div>
    <div class="grid" id="bet-grid"></div>

    <button class="btn" onclick="window.createMatch()">CRIAR / ENTRAR</button>
    <button class="btn" style="background:#444; box-shadow:none;" onclick="window.openMenu()">VOLTAR</button>
  </div>
</div>

<!-- COLEÇÃO -->
<div id="screen-collection" class="screen">
  <div class="panel">
    <h2>COLEÇÃO</h2>

    <select id="collection-filter" onchange="window.collectionFilterChanged()">
      <option value="">Todas</option>
      <option value="common">Common</option>
      <option value="rare">Rare</option>
      <option value="epic">Epic</option>
      <option value="legend">Legend</option>
    </select>

    <div class="counts">
      <span>Common: <b id="count-common">0</b></span>
      <span>Rare: <b id="count-rare">0</b></span>
      <span>Epic: <b id="count-epic">0</b></span>
      <span>Legend: <b id="count-legend">0</b></span>
    </div>

    <div class="collection-grid" id="collection-grid"></div>

    <button class="btn" style="background:#444; box-shadow:none;" onclick="window.openMenu()">VOLTAR</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>
</body>
</html>
