<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic Bafo World</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Titan+One&family=Nunito:wght@400;700&display=swap');
        body { margin: 0; overflow: hidden; background: #1a0b2e; font-family: 'Nunito', sans-serif; color: white; touch-action: none; user-select: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .top-hud { padding: 15px; display: flex; justify-content: space-between; pointer-events: auto; }
        .currency { font-family: 'Titan One'; color: #ffd700; font-size: 1.2rem; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; }
        .modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); width: 85%; max-width: 350px; background: rgba(30, 30, 40, 0.95); border: 2px solid #555; border-radius: 20px; padding: 20px; text-align: center; opacity: 0; pointer-events: none; transition: 0.3s; display: none;}
        .modal.active { transform: translate(-50%, -50%) scale(1); opacity: 1; pointer-events: auto; display: block; }
        .btn { background: #6c5ce7; color: white; border: none; padding: 12px; width: 100%; border-radius: 12px; font-weight: bold; margin-top: 10px; cursor: pointer; pointer-events: auto; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-height: 250px; overflow-y: auto; }
        .grid-item { aspect-ratio: 3/4; background: #333; border-radius: 6px; border: 2px solid transparent; }
        .grid-item.selected { border-color: #ffd700; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
        <div class="top-hud">
            <div class="currency">🪙 <span id="coin-display">0</span></div>
            <button class="btn" style="width:auto;" onclick="window.toggleMenu('menu-main')">☰</button>
        </div>
    </div>
    <div id="menu-main" class="modal active">
        <h2>MAGIC BAFO</h2>
        <button class="btn" onclick="window.openGacha()">🎁 Pacote (100)</button>
        <button class="btn" onclick="window.openCollection()">🃏 Coleção</button>
        <button class="btn" style="background:#444" onclick="window.toggleMenu('')">Fechar</button>
    </div>
    <div id="menu-collection" class="modal">
        <h2>Apostar Carta</h2>
        <div class="grid" id="collection-grid"></div>
        <button class="btn" onclick="window.confirmMatch()">🔥 APOSTAR!</button>
        <button class="btn" style="background:#444" onclick="window.toggleMenu('menu-main')">Voltar</button>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
