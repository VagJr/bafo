<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Bafo Multiverse</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Titan+One&family=Nunito:wght@400;700&display=swap');
    
    :root { 
        --glass: rgba(15, 15, 25, 0.75); 
        --border: rgba(255, 255, 255, 0.1);
        --gold: #f1c40f; 
        --neon-blue: #00cec9;
        --neon-purple: #a29bfe;
    }
    
    body { 
        margin:0; overflow:hidden; 
        background: radial-gradient(circle at center, #2b0055 0%, #050510 100%);
        font-family:'Nunito',sans-serif; color:white; 
        touch-action:none; user-select:none; 
    }
    
    #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; pointer-events: none; }
    #gameCanvas { display:block; position: relative; z-index: 5; }

    #ui-layer { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }
    
    .hud { padding:10px 20px; display:flex; justify-content:space-between; align-items:flex-start; pointer-events:auto; }
    
    .top-bar { display: flex; gap: 10px; align-items: center; }
    .badge { 
        background:rgba(0,0,0,0.6); border:1px solid #555; 
        padding:5px 15px; border-radius:30px; 
        font-family:'Titan One'; font-size: 0.9rem; text-shadow:0 2px 0 black; 
        backdrop-filter:blur(5px);
    }
    .online-count { color: var(--neon-blue); font-size: 0.8rem; }

    .chat-btn { background: rgba(0,0,0,0.6); border: 1px solid var(--neon-purple); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem; pointer-events: auto; }

    .screen { 
        position:absolute; top:0; left:0; width:100%; height:100%; 
        background:rgba(5, 5, 10, 0.6); 
        z-index:20; display:none; align-items:center; justify-content:center; 
        pointer-events:auto; backdrop-filter: blur(4px); 
    }
    .screen.active { display:flex; animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

    .panel { 
        background:var(--glass); padding:25px; border-radius:24px; 
        border:1px solid var(--border); 
        text-align:center; max-width:500px; width:90%; max-height:90vh; 
        display:flex; flex-direction:column; 
        box-shadow: 0 0 50px rgba(162, 155, 254, 0.15); 
        position: relative; overflow: hidden;
    }
    
    .panel::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 60%); pointer-events: none; }
    .scroll-area { overflow-y:auto; flex:1; margin:15px 0; padding: 5px; z-index: 2; }

    /* BTNS */
    .btn { background:linear-gradient(135deg, #a29bfe, #6c5ce7); border:none; padding:15px; width:100%; border-radius:16px; color:white; font-family:'Titan One'; font-size:1.1rem; margin-top:10px; cursor:pointer; text-shadow: 0 2px 4px rgba(0,0,0,0.3); box-shadow: 0 5px 0 #4834d4; }
    .btn:active { transform:translateY(5px); box-shadow:none; }
    .btn-green { background:linear-gradient(135deg, #2ecc71, #27ae60); box-shadow: 0 5px 0 #16a085; }
    .btn-orange { background:linear-gradient(135deg, #f1c40f, #d35400); box-shadow: 0 5px 0 #c0392b; }
    .btn-blue { background:linear-gradient(135deg, #00cec9, #0984e3); box-shadow: 0 5px 0 #2980b9; }

    input { width:90%; padding:15px; margin:10px 0; border-radius:12px; border:2px solid #444; background:rgba(0,0,0,0.5); color:white; text-align:center; font-size: 1rem; outline: none; }
    
    /* TOAST */
    #toast-area { position:absolute; top:100px; width:100%; display:flex; flex-direction:column; align-items:center; pointer-events:none; z-index:100; }
    .toast { background:rgba(0,0,0,0.9); padding:12px 25px; border-radius:30px; margin-bottom:10px; border: 1px solid var(--gold); color: var(--gold); font-weight: bold; animation:pop 0.3s; }
    @keyframes pop { from{transform:scale(0);} to{transform:scale(1);} }

    /* GRID & CARDS */
    .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap:12px; padding: 5px; }
    .grid-card {
        aspect-ratio: 2.5/3.5; background-color: #1a1a1a; background-size: cover; background-position: center;
        border-radius: 10px; border: 2px solid #555; position: relative; cursor: pointer;
        box-shadow: 0 4px 8px rgba(0,0,0,0.6);
    }
    .grid-card:hover { transform: translateY(-5px); z-index:2; box-shadow: 0 0 15px rgba(255,255,255,0.3); }

    /* COLLECTION SPECIAL */
    .collection-item { display: flex; flex-direction: column; gap: 5px; }
    .sell-btn-small { background: #c0392b; border: none; color: white; border-radius: 5px; padding: 5px; font-weight: bold; font-size: 0.7rem; cursor: pointer; width: 100%; }

    /* INSPECTOR (FULLSCREEN 3D) */
    #card-inspector {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); z-index: 999;
        display: none; align-items: center; justify-content: center;
        perspective: 1000px; /* Para o efeito 3D */
    }
    #card-inspector.active { display: flex; animation: zoomIn 0.3s; }
    @keyframes zoomIn { from{transform:scale(0.5); opacity:0;} to{transform:scale(1); opacity:1;} }

    #inspector-img {
        width: 80vw; height: 70vh; /* QUASE TELA TODA */
        max-width: 400px; max-height: 560px;
        background-size: contain; background-repeat: no-repeat; background-position: center;
        border-radius: 15px;
        box-shadow: 0 0 50px rgba(255,255,255,0.2);
        transition: transform 0.1s; /* Movimento suave */
        transform-style: preserve-3d;
    }
    /* Brilho Holográfico no Inspector */
    #inspector-img::after {
        content: ''; position: absolute; top:0; left:0; width:100%; height:100%;
        background: linear-gradient(125deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.1) 40%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0.1) 60%, rgba(255,255,255,0) 100%);
        pointer-events: none; border-radius: 15px; mix-blend-mode: overlay;
    }

    /* CHAT PANEL */
    #screen-chat .panel { height: 60vh; justify-content: space-between; }
    #chat-messages { flex: 1; overflow-y: auto; text-align: left; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 10px; margin-bottom: 10px; font-size: 0.9rem; }
    .chat-input-area { display: flex; gap: 10px; }
    #chat-input { margin: 0; flex: 1; text-align: left; }

    /* BOOSTER ANIM */
    #booster-display { display:flex; justify-content:center; gap:15px; height:200px; align-items:center; perspective:1000px; }
    .booster-card { width:120px; height:168px; position: relative; transform-style: preserve-3d; transition: transform 0.8s; opacity: 0; transform: translateY(100px) rotateY(180deg); }
    .booster-card.reveal { opacity: 1; transform: translateY(0) rotateY(0deg); }
    .booster-card .front { position: absolute; width: 100%; height: 100%; background-size: cover; border-radius: 10px; backface-visibility: hidden; border: 2px solid gold; transform: rotateY(0deg); }
    .booster-card .back { position: absolute; width: 100%; height: 100%; background: #333; border-radius: 10px; backface-visibility: hidden; border: 2px solid #555; transform: rotateY(180deg); }

    /* MARKET */
    .market-card { display: flex; align-items: center; background: rgba(255,255,255,0.05); border-radius:12px; margin-bottom:8px; padding:8px; border:1px solid #444; }
    .m-img { width: 50px; height: 70px; background-size: cover; border-radius: 6px; margin-right: 12px; }
    .m-info { text-align: left; font-size: 0.9rem; flex: 1; }

  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<canvas id="gameCanvas"></canvas>
<div id="toast-area"></div>

<div id="card-inspector" onclick="window.closeInspector()">
    <div id="inspector-img"></div>
    <div style="position:absolute; bottom: 50px; color: #aaa; font-size: 0.8rem;">Toque fora para fechar</div>
</div>

<div id="ui-layer">
  <div class="hud" id="game-hud" style="display:none;">
    <div class="top-bar">
        <div id="turn-badge" class="badge">Aguarde...</div>
        <div class="badge online-count" id="online-counter">Online: 0</div>
    </div>
    <div style="display:flex; gap:10px;">
        <div class="chat-btn" onclick="window.toggleChat()">💬</div>
        <button class="btn" style="width:auto; padding:8px 20px; margin:0; font-size:0.8rem;" onclick="window.openMenu()">Menu</button>
    </div>
  </div>
</div>

<div id="screen-login" class="screen active">
  <div class="panel">
    <h1>BAFO MULTIVERSE</h1>
    <p>Recompensa Diária: 2000 Moedas!</p>
    <input id="login-user" placeholder="Seu Nome" />
    <button class="btn" onclick="window.doLogin()">JOGAR</button>
  </div>
</div>

<div id="screen-menu" class="screen">
  <div class="panel">
    <h2>BASE</h2>
    <div style="position: absolute; top: 10px; right: 20px; font-size: 0.8rem; color: var(--neon-blue);" id="menu-online-counter"></div>
    <div style="display:flex; justify-content:space-around; background:rgba(0,0,0,0.3); padding:15px; border-radius:15px; margin-bottom:15px;">
      <span>🪙 <b id="coins-display" style="color:var(--gold)">0</b></span>
      <span>🃏 <b id="cards-display">0</b></span>
    </div>
    <div class="scroll-area" style="overflow:visible;">
        <button class="btn" onclick="window.openBetting()">⚔️ Duelar</button>
        <button class="btn btn-green" onclick="window.openMarket()">🏪 Mercado</button>
        <button class="btn btn-blue" onclick="window.toggleChat()">💬 Chat Global</button>
        <button class="btn" style="background:#444;" onclick="window.openCollection()">🗂️ Coleção</button>
        <button class="btn btn-orange" onclick="window.buyBooster()">🎁 Pacote (500)</button>
    </div>
  </div>
</div>

<div id="screen-chat" class="screen">
    <div class="panel">
        <h3 style="color:var(--neon-blue)">CHAT GLOBAL</h3>
        <div id="chat-messages"></div>
        <div class="chat-input-area">
            <input id="chat-input" placeholder="Digite algo..." />
            <button class="btn btn-blue" style="width:auto; margin:10px 0;" onclick="window.sendChat()">➤</button>
        </div>
        <button class="btn" style="background:#444; margin-top:5px;" onclick="window.toggleChat()">FECHAR</button>
    </div>
</div>

<div id="screen-booster" class="screen">
  <div class="panel">
    <h2 style="color:gold;">PACOTE ABERTO!</h2>
    <div id="booster-display"></div>
    <button class="btn" style="margin-top:20px;" onclick="window.openMenu()">GUARDAR</button>
  </div>
</div>

<div id="screen-bet" class="screen">
  <div class="panel">
    <h3>APOSTAS</h3>
    <div class="scroll-area"><div class="grid" id="bet-grid"></div></div>
    <div style="display:flex; gap:10px; width:100%;">
        <button class="btn" onclick="window.createMatch()">DUELAR</button>
        <button class="btn" style="background:#444;" onclick="window.openMenu()">VOLTAR</button>
    </div>
  </div>
</div>

<div id="screen-market" class="screen">
  <div class="panel">
    <h3>MERCADO</h3>
    <div class="scroll-area"><div class="grid" id="market-grid" style="display:block;"></div></div>
    <button class="btn" style="background:#444;" onclick="window.openMenu()">VOLTAR</button>
  </div>
</div>

<div id="screen-collection" class="screen">
  <div class="panel">
    <h3>COLEÇÃO</h3>
    <p style="font-size:0.7rem; color:#aaa;">Clique na imagem para ampliar em 3D</p>
    <div class="scroll-area"><div class="grid" id="collection-grid"></div></div>
    <button class="btn" style="background:#444;" onclick="window.openMenu()">VOLTAR</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>

<script>
    const bgCanvas = document.getElementById('bg-canvas');
    const bgCtx = bgCanvas.getContext('2d');
    let bgW, bgH; let spores = []; const mouse = { x: null, y: null, radius: 150 };
    window.addEventListener('resize', resizeBg);
    window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
    window.addEventListener('touchmove', (e) => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });
    window.addEventListener('touchend', () => { mouse.x = null; mouse.y = null; });
    function resizeBg() { bgW = window.innerWidth; bgH = window.innerHeight; bgCanvas.width = bgW; bgCanvas.height = bgH; initSpores(); }
    class Spore {
        constructor() { this.init(); }
        init() { this.x = Math.random() * bgW; this.y = Math.random() * bgH; this.size = Math.random() * 1.5 + 0.5; this.baseX = this.x; this.baseY = this.y; this.density = (Math.random() * 30) + 1; this.speedY = Math.random() * 1 + 0.2; this.alpha = Math.random(); this.alphaSpeed = Math.random() * 0.02 + 0.005; this.color = Math.random() > 0.5 ? '#ffffff' : '#00cec9'; }
        draw() { bgCtx.globalAlpha = this.alpha; bgCtx.fillStyle = this.color; bgCtx.beginPath(); bgCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2); bgCtx.shadowBlur = 8; bgCtx.shadowColor = this.color; bgCtx.fill(); bgCtx.globalAlpha = 1; bgCtx.shadowBlur = 0; }
        update() { this.alpha += this.alphaSpeed; if(this.alpha > 1 || this.alpha < 0.2) this.alphaSpeed = -this.alphaSpeed; this.y -= this.speedY; if(this.y < -10) this.y = bgH + 10; if(mouse.x != null) { let dx = mouse.x - this.x; let dy = mouse.y - this.y; let distance = Math.sqrt(dx*dx + dy*dy); if (distance < mouse.radius) { const f = (mouse.radius - distance) / mouse.radius; this.x -= (dx / distance) * f * this.density; this.y -= (dy / distance) * f * this.density; } else if (this.x !== this.baseX) { this.x -= (this.x - this.baseX)/20; } } }
    }
    function initSpores() { spores = []; for(let i=0; i<150; i++) spores.push(new Spore()); }
    function animateBg() { bgCtx.clearRect(0, 0, bgW, bgH); for(let i=0; i<spores.length; i++) { spores[i].draw(); spores[i].update(); } requestAnimationFrame(animateBg); }
    resizeBg(); animateBg();
</script>
</body>
</html>
